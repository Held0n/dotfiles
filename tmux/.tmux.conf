# Reasonable tmux 3.x defaults
# Copy to ~/.tmux.conf, then reload with: tmux source-file ~/.tmux.conf

##### Prefix and keys #########################################################

# Use Ctrl-a as prefix, keep Ctrl-b available as a passthrough.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config quickly.
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Split panes in the current directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Create new windows in the current directory.
bind c new-window -c "#{pane_current_path}"

# Vim-like pane navigation.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with prefix + H/J/K/L.
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

##### Behavior ################################################################

# Start window and pane indexes at 1.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Faster key response.
set -s escape-time 10

# Keep more scrollback. Agent CLIs can produce long transcripts.
set -g history-limit 100000

# Mouse support: scroll, resize panes, select panes/windows.
set -g mouse on

# Don't rename windows automatically.
set -g allow-rename off

# Keep sessions alive after the last window closes.
set -g detach-on-destroy off

set -g display-time 2000

##### Copy mode ###############################################################

setw -g mode-keys vi

# Enter copy mode with prefix + Escape.
bind Escape copy-mode

# Vim-style selection and copy. Uses the system clipboard when available.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy 2>/dev/null || xclip -selection clipboard 2>/dev/null || wl-copy 2>/dev/null || cat >/dev/null"

##### Terminal and colors #####################################################

# Good default for modern terminals.
set -g default-terminal "tmux-256color"

# Enable true color where supported. tmux 3.x uses terminal-features.
set -as terminal-features ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB"

# Make focus events work for editors that support them.
set -g focus-events on

##### Status line #############################################################

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

set -g status-style "bg=colour236,fg=colour250"
set -g status-left-length 50
set -g status-right-length 100

set -g status-left "#[bg=colour31,fg=colour231,bold] #S #[bg=colour236,fg=colour31] "
set -g status-right "#[fg=colour244]#(whoami)@#H #[fg=colour31]%Y-%m-%d %H:%M "

setw -g window-status-format "#[fg=colour244] #I:#W "
setw -g window-status-current-format "#[bg=colour238,fg=colour231,bold] #I:#W "

set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour81"
set -g message-style "bg=colour31,fg=colour231"

##### Quality of life #########################################################

# Synchronize panes toggle: prefix + S.
bind S setw synchronize-panes \; display-message "synchronize-panes: #{?pane_synchronized,on,off}"

# Quickly list sessions and windows.
bind s choose-tree -s
bind w choose-tree -w

# Open a prompt to rename the current window/session.
bind , command-prompt -I "#W" "rename-window '%%'"
bind '$' command-prompt -I "#S" "rename-session '%%'"

##### Agent-friendly workflow #################################################

# Mark windows when background agent panes become active.
setw -g monitor-activity on
set -g visual-activity off
set -g bell-action any

# Restart the current pane in the same directory.
bind R respawn-pane -k -c "#{pane_current_path}"

# Create a dedicated agent window in the current directory.
bind A new-window -n agent -c "#{pane_current_path}"

# Split into a roomy side pane for an agent.
bind G split-window -h -c "#{pane_current_path}" \; resize-pane -R 20

# Save recent pane output for debugging or handoff.
bind P capture-pane -S -3000 \; save-buffer /tmp/tmux-pane-#S-#I-#P.log \; display-message "saved pane log"
